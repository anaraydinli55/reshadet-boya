<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nelson Boya - Professional İnşaat Materialları Kataloqu</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #8e44ad;
      --secondary: #2ecc71;
      --dark-bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'Poppins', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

    header {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 3px solid var(--primary);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 24px; font-weight: 800; color: var(--white); text-decoration: none; }
    .logo span { color: var(--primary); }

    .cart-btn {
      background: var(--primary);
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      display: flex; align-items: center; gap: 12px;
      transition: 0.3s ease;
    }
    .cart-btn:hover { background: var(--secondary); transform: translateY(-2px); }
    #cart-count { background: white; color: var(--primary); padding: 2px 8px; border-radius: 50%; font-size: 13px; font-weight: 800; }

    main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    
    .hero { text-align: center; margin-bottom: 50px; padding: 0 20px; }
    .hero h1 { font-size: clamp(28px, 5vw, 42px); margin-bottom: 15px; color: var(--white); }
    .hero p { color: var(--text-dim); font-size: 18px; max-width: 800px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.4s ease;
      display: flex; flex-direction: column;
    }

    .card:hover { transform: translateY(-10px); border-color: var(--primary); }

    .img-box { width: 100%; height: 280px; background: white; padding: 10px; display: flex; align-items: center; justify-content: center; }
    /* Şəkillər birbaşa ana qovluqdadırsa, src düzgün işləyəcək */
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .info { padding: 20px; flex-grow: 1; text-align: center; }
    .info h3 { color: var(--white); margin-bottom: 10px; font-size: 18px; }
    .info p { color: var(--text-dim); font-size: 13px; margin-bottom: 15px; min-height: 40px; }
    .price-tag { font-size: 22px; font-weight: 800; color: var(--secondary); margin-bottom: 15px; }

    .controls { display: flex; gap: 10px; padding: 0 20px 20px; }
    .qty-input { width: 70px; padding: 10px; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; text-align: center; font-weight: bold; }
    .add-btn { flex: 1; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .add-btn:hover { background: var(--secondary); }

    /* Sidebar */
    #sidebar {
      position: fixed; top: 0; right: -100%; width: 380px; height: 100%;
      background: #0f172a; z-index: 2000; transition: 0.5s ease-in-out;
      padding: 30px; box-shadow: -15px 0 40px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
    }
    #sidebar.active { right: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
    .items-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
    .item { padding: 12px 0; border-bottom: 1px solid #1e293b; }
    .total-area { border-top: 3px solid var(--primary); padding-top: 20px; }
    .total-line { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
    .whatsapp-order { width: 100%; padding: 18px; background: #25d366; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }

    .wa-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 1000; transition: 0.3s; }
    .wa-float:hover { transform: scale(1.1); }

    @media (max-width: 480px) { #sidebar { width: 100%; } }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="#" class="logo">NELSON <span>BOYA</span></a>
      <div class="cart-btn" onclick="toggleCart()">SƏBƏT <span id="cart-count">0</span></div>
    </div>
  </header>

  <a href="https://wa.me/994517279955" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="38" alt="WA">
  </a>

  <main>
    <section class="hero">
      <h1>Professional Boya və Lak Kataloqu</h1>
      <p>Nelson brendinin yüksək keyfiyyətli məhsulları ilə evinizi və binanızı yeniləyin.</p>
    </section>
    <div class="grid" id="product-grid"></div>
  </main>

  <div id="sidebar">
    <div class="sidebar-header">
      <h3>SİFARİŞ SƏBƏTİ</h3>
      <span onclick="toggleCart()" style="cursor:pointer; font-size:35px; color:var(--text-dim)">&times;</span>
    </div>
    <div class="items-list" id="cart-items"></div>
    <div class="total-area">
      <div class="total-line">
        <span>ÜMUMİ CƏM:</span>
        <span id="total-price">0.00 AZN</span>
      </div>
      <button class="whatsapp-order" onclick="sendOrder()">WHATSAPP-LA SİFARİŞ ET</button>
    </div>
  </div>

  <script>
    // Şəkillər birbaşa ana qovluqda olduğu üçün yollar sadəcə adlarıdır
    const products = [
      { id: 1, name: "Nelsilikon Fasad (25kq)", desc: "Silikon əsaslı yüksək keyfiyyətli fasad boyası.", price: 88.00, img: "1.webp" },
      { id: 2, name: "Nelgloss Parlak Boya", desc: "Metal və taxta üçün parlaq enamel boya.", price: 16.50, img: "2.webp" },
      { id: 3, name: "Nelson Akrilik Macunu", desc: "Səth hamarlaşdıran professional dolğu.", price: 23.00, img: "3.webp" },
      { id: 4, name: "Nelsilikon Fasad (15L)", desc: "Xarici divarlar üçün silikonlu boya.", price: 62.00, img: "4.webp" },
      { id: 5, name: "Nelplastik Divar Boyası", desc: "Daxili məkanlar üçün mat divar boyası.", price: 44.00, img: "5.webp" },
      { id: 6, name: "Nelakril Xarici Divar", desc: "Atmosferə davamlı akrilik boya.", price: 56.00, img: "6.webp" },
      { id: 7, name: "Nelplus Yuyulan Boya", desc: "Ləkə saxlamayan premium daxili boya.", price: 72.00, img: "7.webp" },
      { id: 8, name: "Neltavan Tavan Boyası", desc: "Yüksək bəyazlıqlı mat tavan boyası.", price: 29.00, img: "8.webp" },
      { id: 9, name: "Sintetik Antipas Boya", desc: "Paslanmaya qarşı qoruyucu astar boya.", price: 12.00, img: "9.webp" },
      { id: 10, name: "Professional Parket Lakı", desc: "Cızılmaya davamlı parlaq parket lakı.", price: 19.50, img: "10.webp" },
      { id: 11, name: "Nel Gloss Enamel Boya", desc: "Professional dekorativ sintetik boya.", price: 15.00, img: "11.webp" },
      { id: 12, name: "Sellülozik Dolğu Laki", desc: "Tez quruyan taxta və mebel dolğusu.", price: 21.00, img: "12.webp" },
      { id: 13, name: "Antipas Qruntovka", desc: "Metallar üçün pas əleyhinə astar qrunt.", price: 9.00, img: "13.webp" },
      { id: 14, name: "Nel Sintetik Parlak", desc: "Sintetik əsaslı parlaq enamel boya.", price: 14.50, img: "14.webp" },
      { id: 15, name: "Nelastar Silikonlu Astar", desc: "Boya sərfiini azaldan silikonlu qrunt.", price: 38.00, img: "15.webp" },
      { id: 16, name: "Nelbinder Akrilik Astar", desc: "Şəffaf akrilik binder/astar.", price: 10.00, img: "16.webp" }
    ];

    let cart = JSON.parse(localStorage.getItem('nelson_cart')) || [];

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <div class="img-box"><img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x300?text=Nelson+Boya'"></div>
            <div class="info">
              <h3>${p.name}</h3>
              <p>${p.desc}</p>
              <div class="price-tag">${p.price.toFixed(2)} AZN</div>
            </div>
            <div class="controls">
              <input type="number" id="qty-${p.id}" value="1" min="1" class="qty-input">
              <button class="add-btn" onclick="addToCart(${p.id})">SƏBƏTƏ AT</button>
            </div>
          </div>`;
      });
    }

    function addToCart(pid) {
      const p = products.find(x => x.id === pid);
      const qty = parseInt(document.getElementById(`qty-${pid}`).value);
      const found = cart.find(x => x.id === pid);
      if(found) found.qty += qty; else cart.push({...p, qty});
      updateCart();
      if(window.innerWidth > 768) toggleCart(true);
    }

    function removeItem(i) { cart.splice(i, 1); updateCart(); }

    function updateCart() {
      const list = document.getElementById('cart-items');
      const totalEl = document.getElementById('total-price');
      list.innerHTML = ''; let total = 0; let count = 0;
      cart.forEach((item, i) => {
        let sum = item.price * item.qty; total += sum; count += item.qty;
        list.innerHTML += `<div class="item">
          <b>${item.name}</b>
          <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:5px;">
            <span>${item.qty} ədəd x ${item.price.toFixed(2)} AZN</span>
            <span style="font-weight:bold; color:var(--secondary);">${sum.toFixed(2)} AZN</span>
          </div>
          <span style="color:red; cursor:pointer; font-size:12px; font-weight:bold; margin-top:5px; display:inline-block;" onclick="removeItem(${i})">SİL 🗑️</span>
        </div>`;
      });
      document.getElementById('cart-count').innerText = count;
      totalEl.innerText = total.toFixed(2) + " AZN";
      localStorage.setItem('nelson_cart', JSON.stringify(cart));
    }

    function toggleCart(open = null) {
      const sb = document.getElementById('sidebar');
      if(open === true) sb.classList.add('active'); else if(open === false) sb.classList.remove('active'); else sb.classList.toggle('active');
    }

    function sendOrder() {
      if(cart.length === 0) return alert("Səbət boşdur!");
      let txt = "*YENİ SİFARİŞ (Nelson Boya)*\n\n";
      let total = 0;
      cart.forEach((it, i) => {
        let s = it.price * it.qty; total += s;
        txt += `${i+1}. *${it.name}*\n   Miqdar: ${it.qty} ədəd\n   Məbləğ: ${s.toFixed(2)} AZN\n\n`;
      });
      txt += `*ÜMUMİ YEKUN: ${total.toFixed(2)} AZN*`;
      window.open(`https://wa.me/994517279955?text=${encodeURIComponent(txt)}`, '_blank');
    }

    window.onload = () => { renderProducts(); updateCart(); };
  </script>
</body>
</html>
