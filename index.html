<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nelson Boya — Professional Boya, Astar və Dolğu Kataloqu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:     #c9a84c;
      --gold-dim: #a07c2e;
      --ink:      #0d0d0d;
      --panel:    #161616;
      --card:     #1c1c1c;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0ece4;
      --muted:    #7a7672;
      --green:    #25d366;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 500;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center; gap: 8px;
    }

    .logo-line { width: 3px; height: 26px; background: var(--gold); border-radius: 2px; }
    .logo em { color: var(--gold); font-style: normal; }

    .cart-btn {
      display: flex; align-items: center; gap: 12px;
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      padding: 10px 22px; border-radius: 2px; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    }

    .cart-badge { background: var(--gold); color: var(--ink); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }

    /* HERO */
    .hero {
      max-width: 1280px; margin: 0 auto; padding: 80px 32px 60px;
      display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: end;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(42px, 6vw, 80px); font-weight: 800; line-height: 0.95; text-transform: uppercase; }
    .hero h1 em { color: var(--gold); font-style: normal; display: block; }

    /* GRID */
    main { max-width: 1280px; margin: 0 auto; padding: 60px 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr)); gap: 2px; }

    /* CARD */
    .card { background: var(--card); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: 0.3s; }
    .card:hover { background: #222; }
    .card-img { width: 100%; aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
    .card:hover .card-img img { transform: scale(1.06); }

    .card-body { padding: 20px 20px 0; flex-grow: 1; }
    .card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text); }
    .card-desc { font-size: 12.5px; color: var(--muted); min-height: 38px; line-height: 1.4; }
    .card-price { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--gold); margin-top: 14px; }
    
    .card-footer { padding: 16px 20px 20px; display: flex; gap: 8px; }

    /* QTY */
    .qty-wrap { display: flex; align-items: center; background: var(--panel); border: 1px solid var(--border); }
    .qty-btn { width: 34px; height: 42px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; }
    .qty-input { width: 44px; height: 42px; border: none; background: transparent; color: var(--text); text-align: center; font-weight: 600; }
    .qty-input:focus { outline: none; }

    .add-btn { flex: 1; height: 42px; background: var(--gold); color: var(--ink); border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 13px; letter-spacing: 1px; transition: 0.3s; }
    .add-btn:hover { background: #e0b955; }

    /* SIDEBAR */
    #sidebar { position: fixed; top: 0; right: -100%; width: 420px; height: 100dvh; background: var(--panel); z-index: 1000; display: flex; flex-direction: column; transition: 0.45s cubic-bezier(0.77, 0, 0.175, 1); border-left: 1px solid var(--border); }
    #sidebar.active { right: 0; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; opacity: 0; pointer-events: none; transition: 0.4s; }
    .overlay.active { opacity: 1; pointer-events: all; }

    .cart-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
    .sidebar-footer { padding: 20px 28px 28px; border-top: 1px solid var(--border); }
    
    .wa-order-btn { width: 100%; padding: 18px; background: var(--green); color: white; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 16px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 10px; }

    /* WA FLOAT */
    .wa-float { position: fixed; bottom: 30px; left: 30px; background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 800; box-shadow: 0 8px 24px rgba(37,211,102,0.3); transition: 0.3s; }
    .wa-float:hover { transform: scale(1.1); }

    @media (max-width: 768px) { #sidebar { width: 100%; } .hero { grid-template-columns: 1fr; padding: 40px 20px; } }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="#" class="logo"><span class="logo-line"></span>NELSON <em>BOYA</em></a>
      <button class="cart-btn" onclick="toggleCart(true)">
        SƏBƏT <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </header>

  <section class="hero">
    <div>
      <div style="font-size:11px; letter-spacing:4px; color:var(--gold); margin-bottom:20px;">PREMİUM KATALOQ — 2026</div>
      <h1>PROFESSİONAL<br><em>BOYA, DOLĞU</em>  <em>LAK, ASTAR</em> SİSTEMLƏRİ</h1>
      <p style="color:var(--muted); max-width:480px; margin-top:20px; font-weight:300;">Nelson brendinin yüksək texnologiyalı məhsulları ilə məkanlarınıza dəyər qatın. Azərbaycanın №1 inşaat boyası seçimi.</p>
    </div>
    <div class="hero-stats">
      <div style="text-align:right;">
        <div class="stat-num">16+</div>
        <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:2px;">Məhsul növü</div>
      </div>
    </div>
  </section>

  <main>
    <div class="grid" id="product-grid"></div>
  </main>

  <footer style="padding: 40px 32px; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 1px;">
    © 2026 NELSON BOYA. BÜTÜN HÜQUQLAR QORUNUR.
  </footer>

  <div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

  <div id="sidebar">
    <div style="padding:28px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <div style="font-family:'Barlow Condensed'; font-size:20px; letter-spacing:3px; font-weight:700;">SİFARİŞ SƏBƏTİ</div>
      <button onclick="toggleCart(false)" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-body" id="cart-items"></div>
    <div class="sidebar-footer">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:2px;">Ümumi yekun</span>
        <span style="font-family:'Barlow Condensed'; font-size:32px; font-weight:800; color:var(--gold);"><span id="total-price">0.00</span> AZN</span>
      </div>
      <button class="wa-order-btn" onclick="sendOrder()">WhatsApp ilə Sifariş Et</button>
    </div>
  </div>

  <a href="https://wa.me/994517279955" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="32">
  </a>

  <script>
    // Şəkillərin yolları birbaşa ana qovluğa (root) uyğun olaraq 1.webp ... 16.webp kimi düzəldildi
    const products = [
      { id: 1,  name: "Nelsilikon Fasad (25kq)", desc: "Silikon əsaslı, xarici fasadlar üçün davamlı boya.", price: 88.00, img: "1.webp" },
      { id: 2,  name: "Nelgloss Parlaq Boya", desc: "Metal və taxta üçün yüksək parlaqlıqlı enamel.", price: 140.00, img: "2.webp" },
      { id: 3,  name: "Nelson Akrilik Macunu", desc: "Səth hamarlaşdıran professional dolğu.", price: 23.00, img: "3.webp" },
      { id: 4,  name: "Nelsilikon Fasad (15L)", desc: "Xarici divarlar üçün silikonlu boya.", price: 62.00, img: "4.webp" },
      { id: 5,  name: "Nelplastik Divar Boyası", desc: "Daxili məkanlar üçün mat daxili divar boyası.", price: 44.00, img: "5.webp" },
      { id: 6,  name: "Nelakril Xarici Divar", desc: "Atmosfer şəraitinə davamlı akrilik boya.", price: 56.00, img: "6.webp" },
      { id: 7,  name: "Nelplus Yuyulan Boya", desc: "Ləkə saxlamayan premium daxili boya.", price: 72.00, img: "7.webp" },
      { id: 8,  name: "Neltavan Tavan Boyası", desc: "Yüksək bəyazlıqlı mat tavan boyası.", price: 29.00, img: "8.webp" },
      { id: 9,  name: "Sintetik Antipas Boya", desc: "Paslanmaya qarşı qoruyucu metal astarı.", price: 12.00, img: "9.webp" },
      { id: 10, name: "Professional Parket Lakı", desc: "Cızılmaya davamlı parlaq parket lakı.", price: 19.50, img: "10.webp" },
      { id: 11, name: "Nel Gloss Enamel Boya", desc: "Professional dekorativ sintetik boya.", price: 15.00, img: "11.webp" },
      { id: 12, name: "Sellülozik Dolğu Laki", desc: "Tez quruyan taxta və mebel dolğusu.", price: 21.00, img: "12.webp" },
      { id: 13, name: "Antipas Qruntovka", desc: "Metallar üçün pas əleyhinə astar qrunt.", price: 9.00,  img: "13.webp" },
      { id: 14, name: "Nel Sintetik Parlak", desc: "Sintetik əsaslı parlaq enamel boya.", price: 14.50, img: "14.webp" },
      { id: 15, name: "Nelastar Silikonlu Astar", desc: "Boya sərfiini azaldan silikonlu qrunt.", price: 38.00, img: "15.webp" },
      { id: 16, name: "Nelbinder Akrilik Astar", desc: "Şəffaf akrilik binder/astar.", price: 10.00, img: "16.webp" }
    ];

    let cart = JSON.parse(localStorage.getItem('nelson_cart_final')) || [];

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      products.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <div class="card-img"><img src="${p.img}" onerror="this.src='https://placehold.co/400x400/ffffff/000000?text=${p.id}'"></div>
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              <div class="card-desc">${p.desc}</div>
              <div class="card-price">${p.price.toFixed(2)} AZN</div>
            </div>
            <div class="card-footer">
              <div class="qty-wrap">
                <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
                <input type="number" class="qty-input" id="qty-${p.id}" value="1" min="1">
                <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
              </div>
              <button class="add-btn" onclick="addToCart(${p.id})">Səbətə at</button>
            </div>
          </div>`;
      });
    }

    function changeQty(id, delta) {
      const el = document.getElementById(`qty-${id}`);
      el.value = Math.max(1, parseInt(el.value || 1) + delta);
    }

    function addToCart(pid) {
      const p = products.find(x => x.id === pid);
      const qtyInput = document.getElementById(`qty-${pid}`);
      const qty = parseInt(qtyInput.value) || 1;
      
      const found = cart.find(x => x.id === pid);
      if(found) found.qty += qty; else cart.push({...p, qty});
      
      qtyInput.value = 1; // Reset input
      updateUI();
      toggleCart(true);
    }

    function removeItem(index) { cart.splice(index, 1); updateUI(); }

    function updateUI() {
      const list = document.getElementById('cart-items');
      const totalEl = document.getElementById('total-price');
      const countEl = document.getElementById('cart-count');
      
      list.innerHTML = cart.length === 0 ? '<div style="text-align:center; padding:40px; color:var(--muted); font-size:13px;">Səbət boşdur</div>' : '';
      
      let total = 0, count = 0;
      cart.forEach((item, i) => {
        const sum = item.price * item.qty;
        total += sum; count += item.qty;
        list.innerHTML += `
          <div style="display:flex; gap:15px; padding:15px 0; border-bottom:1px solid var(--border);">
            <div style="flex:1;">
              <div style="font-family:'Barlow Condensed'; font-weight:700; font-size:15px; text-transform:uppercase; color:var(--text);">${item.name}</div>
              <div style="font-size:12px; color:var(--muted); margin-top:4px;">${item.qty} ədəd x ${item.price.toFixed(2)} AZN</div>
              <button onclick="removeItem(${i})" style="background:none; border:none; color:#ff4d4d; font-size:10px; cursor:pointer; margin-top:8px; font-weight:700;">SİL ✕</button>
            </div>
            <div style="font-family:'Barlow Condensed'; font-weight:700; color:var(--gold); font-size:18px;">${sum.toFixed(2)}</div>
          </div>`;
      });
      
      countEl.innerText = count;
      totalEl.innerText = total.toFixed(2);
      localStorage.setItem('nelson_cart_final', JSON.stringify(cart));
    }

    function toggleCart(open) {
      document.getElementById('sidebar').classList.toggle('active', open);
      document.getElementById('overlay').classList.toggle('active', open);
    }

    function sendOrder() {
      if(!cart.length) return alert("Səbətiniz boşdur!");
      let txt = "*YENİ SİFARİŞ — NELSON BOYA*\n\n";
      let total = 0;
      cart.forEach((it, i) => {
        const s = it.price * it.qty; total += s;
        txt += `${i+1}. *${it.name}*\n   Miqdar: ${it.qty} ədəd\n   Cəm: ${s.toFixed(2)} AZN\n\n`;
      });
      txt += `*ÜMUMİ YEKUN MƏBLƏĞ: ${total.toFixed(2)} AZN*`;
      window.open(`https://wa.me/994517279955?text=${encodeURIComponent(txt)}`, '_blank');
    }

    window.onload = () => { renderProducts(); updateUI(); };
  </script>
</body>
</html>
