<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nelson Boya — Professional Boya, Astar və Dolğu Kataloqu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:     #c9a84c;
      --gold-dim: #a07c2e;
      --ink:      #0d0d0d;
      --panel:    #161616;
      --card:     #1c1c1c;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0ece4;
      --muted:    #7a7672;
      --green:    #25d366;
      --music-blue: #00d4ff;
      --viktoria-purple: #a855f7;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--ink);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 500;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 65px; /* Daha dar header */
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center; gap: 8px;
    }

    .logo-line { width: 3px; height: 26px; background: var(--gold); border-radius: 2px; }
    .logo em { color: var(--gold); font-style: normal; }

    .cart-btn {
      display: flex; align-items: center; gap: 12px;
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      padding: 8px 18px; border-radius: 2px; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    }

    .cart-badge { background: var(--gold); color: var(--ink); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }

    /* REKLAM SECTION */
    .ad-section {
        margin-bottom: 20px; /* Sizin istədiyiniz 0.5sm ara */
        padding-top: 5px;
    }

    .btn-boyalar {
      display: inline-flex;
      align-items: center;
      background-color: var(--viktoria-purple);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 6px 6px 15px;
      border-radius: 50px;
      box-shadow: 0 4px 0 #7c3aed, 0 6px 12px rgba(120, 40, 200, 0.35);
      transition: all 0.15s ease;
      margin-top: 2px;
    }
    .btn-boyalar:hover {
      box-shadow: 0 2px 0 #7c3aed, 0 4px 8px rgba(120, 40, 200, 0.35);
      transform: translateY(2px);
    }
    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center; background-color: #9333ea;
      width: 26px; height: 26px; border-radius: 50%; margin-left: 10px;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
    }

    .hero {
      max-width: 1280px; 
      margin: 0 auto; 
      padding: 0px 32px 30px; 
      display: grid; 
      grid-template-columns: 1fr auto; 
      gap: 20px; 
      align-items: end;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(32px, 5vw, 65px); font-weight: 800; line-height: 1; text-transform: uppercase; margin-top: 5px; }

    main { max-width: 1280px; margin: 0 auto; padding: 30px 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr)); gap: 2px; }

    /* CARD DÜZƏLİŞİ */
    .card { background: var(--card); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: 0.3s; }
    .card-name { 
        font-family: 'Barlow Condensed', sans-serif; 
        font-size: 18px; 
        font-weight: 700; 
        text-transform: uppercase; 
        margin-bottom: 8px; 
        color: var(--text); 
        height: 48px; /* Sətir hündürlüyü artırıldı */
        overflow: hidden; 
        line-height: 1.3; /* Yazı kəsilməsin deyə */
        padding-top: 2px; 
    }

    .card-img { width: 100%; aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .card-body { padding: 15px 20px 0; flex-grow: 1; }
    .card-desc { font-size: 12px; color: var(--muted); min-height: 38px; line-height: 1.4; }
    .card-price { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--gold); margin-top: 10px; }
    .card-footer { padding: 15px 20px 20px; display: flex; gap: 8px; }

    .qty-wrap { display: flex; align-items: center; background: var(--panel); border: 1px solid var(--border); }
    .qty-btn { width: 34px; height: 40px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; }
    .qty-input { width: 44px; height: 40px; border: none; background: transparent; color: var(--text); text-align: center; font-weight: 600; }

    .add-btn { flex: 1; height: 40px; background: var(--gold); color: var(--ink); border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 12px; letter-spacing: 1px; }

    /* SIDEBAR */
    #sidebar { position: fixed; top: 0; right: -100%; width: 420px; height: 100dvh; background: var(--panel); z-index: 1100; display: flex; flex-direction: column; transition: 0.45s cubic-bezier(0.77, 0, 0.175, 1); border-left: 1px solid var(--border); }
    #sidebar.active { right: 0; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1050; opacity: 0; pointer-events: none; transition: 0.4s; }
    .overlay.active { opacity: 1; pointer-events: all; }

    .cart-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
    .sidebar-footer { padding: 20px 28px 28px; border-top: 1px solid var(--border); }
    
    .wa-order-btn { width: 100%; padding: 18px; background: var(--green); color: white; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 16px; letter-spacing: 2px; }
    .clear-cart-btn { width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; cursor: pointer; border-radius: 2px; }
    
    /* SEBET INPUT */
    .cart-qty-input { 
        width: 55px; 
        background: #222; 
        border: 1px solid var(--gold); 
        color: var(--text); 
        text-align: center; 
        border-radius: 4px; 
        padding: 5px; 
        font-weight: bold; 
        font-family: 'Barlow Condensed'; 
        font-size: 18px; 
        outline: none;
    }

    /* FLOATING CONTROLS */
    .floating-controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
    .float-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.4); cursor: pointer; transition: 0.3s; border: none; text-decoration: none; }
    .music-float { background: var(--music-blue); color: white; font-size: 24px; animation: musicPulse 2s infinite; }
    .wa-float { background: var(--green); }

    @media (max-width: 768px) { 
        #sidebar { width: 100%; } 
        .hero { grid-template-columns: 1fr; padding: 0 20px 20px; gap: 10px; } 
    }
  </style>
</head>
<body>

  <audio id="bgMusic" src="musiqi1.mpeg" loop></audio>

  <header>
    <div class="header-inner">
      <a href="#" class="logo"><span class="logo-line"></span>NELSON <em>BOYA</em></a>
      <button class="cart-btn" onclick="toggleCart(true)">
        SƏBƏT <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </header>

  <section class="hero">
    <div>
      <div class="ad-section">
        <div style="font-size: 9px; color: var(--music-blue); text-transform: lowercase; letter-spacing: 1px; margin-bottom: 0px;">google reklam</div>
        <a href="https://viktoria-az.store" target="_blank" class="btn-boyalar">
          Viktoria Paltar Boyaları
          <span class="btn-icon">»</span>
        </a>
      </div>
      
      <div style="font-size:11px; letter-spacing:4px; color:var(--gold); margin-bottom:5px;">PREMİUM KATALOQ — 2026</div>
      <h1>PROFESSİONAL<br><em>BOYA, DOLĞU</em> <em>LAK, ASTAR</em> MƏHSULLARI</h1>
    </div>
    <div class="hero-stats">
      <div style="text-align:right;">
        <div style="font-family:'Barlow Condensed'; font-size:40px; font-weight:800; color:var(--gold); line-height:1;">16+</div>
        <div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Məhsul növü</div>
      </div>
    </div>
  </section>

  <main>
    <div class="grid" id="product-grid"></div>
  </main>

  <div class="floating-controls">
    <button class="float-icon music-float" id="musicBtn" onclick="toggleMusic()" title="Musiqi">🎵</button>
    <a href="https://wa.me/994517279955?text=Salam!%20Nelson%20boya%20məhsulları%20ilə%20bağlı%20sifariş%20vermək%20istəyirəm." 
       class="float-icon wa-float" target="_blank" title="WhatsApp">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="32" alt="WA">
    </a>
  </div>

  <div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

  <div id="sidebar">
    <div style="padding:28px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <div style="font-family:'Barlow Condensed'; font-size:20px; letter-spacing:3px; font-weight:700;">SİFARİŞ SƏBƏTİ</div>
      <button onclick="toggleCart(false)" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-body" id="cart-items"></div>
    <div class="sidebar-footer">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:2px;">Ümumi yekun</span>
        <span style="font-family:'Barlow Condensed'; font-size:32px; font-weight:800; color:var(--gold);"><span id="total-price">0.00</span> AZN</span>
      </div>
      <button class="wa-order-btn" onclick="sendOrder()">Sifarişi Tamamla</button>
      <button class="clear-cart-btn" onclick="clearCart()">Səbəti Təmizlə</button>
    </div>
  </div>

  <script>
    const products = [
      { id: 1,  name: "Nelbinder Akrilik Astar (1LT)", desc: "Səth hazırlığı üçün yüksək yapışma qabiliyyətli astar.", price: 6.00, img: "1.webp" },
      { id: 2,  name: "Nelastar Silikonlu Astar", desc: "Boya sərfiini azaldan silikonlu daxili/xarici qrunt.", price: 27.00, img: "2.webp" },
      { id: 3,  name: "Nelson Sintetik Parlaq Boya", desc: "Metal və taxta üçün dekorativ parlaq boya.", price: 14.50, img: "3.webp" },
      { id: 4,  name: "Nelson Sintetik Antipas Boya", desc: "Metalı pasdan qoruyan antikorroziv professional astar.", price: 10.70, img: "4.webp" },
      { id: 5,  name: "Nelson Sellülozik Dolğu Lakı", desc: "Taxta məsamələrini tam dolduran tez quruyan dolğu.", price: 15.00, img: "5.webp" },
      { id: 6,  name: "Nelson Sintetik Parlaq Parket Lakı", desc: "Döşəmələr üçün cızılmaya davamlı parlaq parket lakı.", price: 14.00, img: "6.webp" },
      { id: 7,  name: "Nelson Sintetik Antipas Boya (Böyük)", desc: "Pas əleyhinə yüksək müdafiə qabiliyyətli boya.", price: 10.70, img: "7.webp" },
      { id: 8,  name: "Nelson Sintetik Parlaq Boya (Universal)", desc: "Həm daxili həm xarici səthlər üçün parlaq boya.", price: 14.50, img: "8.webp" },
      { id: 9,  name: "Neltavan Tavan Boyası", desc: "Tavanlar üçün ultra bəyaz, qoxusuz mat boya.", price: 29.00, img: "9.webp" },
      { id: 10, name: "Nelplus Yuyula Bilən Plastik Boya", desc: "Ləkə saxlamayan, asan silinən premium daxili boya.", price: 28.00, img: "10.webp" },
      { id: 11, name: "Nelakril Xarici Divar Boyası", desc: "Atmosfer şəraitinə davamlı fasad boyası.", price: 17.00, img: "11.webp" },
      { id: 12, name: "Nelplastik Daxili Divar Boyası", desc: "Tənəffüs edən, dekorativ mat daxili divar boyası.", price: 44.00, img: "12.webp" },
      { id: 13, name: "Nelson Silikon Əsaslı Fasad Boyası", desc: "Yağışa və günəşə davamlı silikonlu boya.", price: 62.00,  img: "13.webp" },
      { id: 14, name: "Nelson Akrilik Macunu", desc: "Divar nahamarlıqlarını hamarlaşdıran dolğu.", price: 23.00, img: "14.webp" },
      { id: 15, name: "Nelgloss Parlaq Boya (Premium)", desc: "Premium dərəcəli yüksək parlaqlıqlı enamel boya.", price: 140.00, img: "15.webp" },
      { id: 16, name: "Nelson Silikon Əsaslı Fasad (Böyük)", desc: "Böyük həcmli, yüksək örtücülü fasad boyası.", price: 88.00, img: "16.webp" }
    ];

    let cart = JSON.parse(localStorage.getItem('nelson_cart_final')) || [];
    let audioInitiated = false;

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = "";
      products.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <div class="card-img"><img src="${p.img}" onerror="this.src='https://placehold.co/400x400/ffffff/000000?text=Nelson'"></div>
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              <div class="card-desc">${p.desc}</div>
              <div class="card-price">${p.price.toFixed(2)} AZN</div>
            </div>
            <div class="card-footer">
              <div class="qty-wrap">
                <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
                <input type="number" class="qty-input" id="qty-${p.id}" value="1" min="1" onclick="this.select()">
                <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
              </div>
              <button class="add-btn" onclick="addToCart(${p.id})">Səbətə at</button>
            </div>
          </div>`;
      });
    }

    function changeQty(id, delta) {
      const el = document.getElementById(`qty-${id}`);
      let val = parseInt(el.value) || 1;
      el.value = Math.max(1, val + delta);
    }

    function addToCart(pid) {
      const p = products.find(x => x.id === pid);
      const qtyInput = document.getElementById(`qty-${pid}`);
      const qty = parseInt(qtyInput.value) || 1;
      const found = cart.find(x => x.id === pid);
      if(found) found.qty += qty; else cart.push({...p, qty});
      qtyInput.value = 1;
      updateUI();
      toggleCart(true);
    }

    function removeItem(index) { cart.splice(index, 1); updateUI(); }

    function clearCart() {
      if(confirm("Səbəti boşaltmaq istədiyinizə əminsiniz?")) {
        cart = [];
        updateUI();
      }
    }

    function updateItemQty(index, newQty) {
      // Input silinəndə (boş olanda) cəmi 0 göstərməsi üçün
      if(newQty === "") {
        cart[index].qty = 0;
      } else {
        let val = parseInt(newQty);
        cart[index].qty = isNaN(val) ? 0 : val;
      }
      
      // Anlıq məbləğləri ekranda yeniləyirik
      const sum = cart[index].qty * cart[index].price;
      document.getElementById(`sum-${index}`).innerText = sum.toFixed(2);
      
      // Ümumi cəmi yenidən hesablayırıq
      calculateGrandTotal();
      localStorage.setItem('nelson_cart_final', JSON.stringify(cart));
    }

    function calculateGrandTotal() {
      let total = 0, count = 0;
      cart.forEach(item => {
        total += (item.qty || 0) * item.price;
        count += (item.qty || 0);
      });
      document.getElementById('total-price').innerText = total.toFixed(2);
      document.getElementById('cart-badge-val') ? document.getElementById('cart-badge-val').innerText = count : '';
      document.getElementById('cart-count').innerText = count;
    }

    function updateUI() {
      const list = document.getElementById('cart-items');
      list.innerHTML = cart.length === 0 ? '<div style="text-align:center; padding:40px; color:var(--muted); font-size:13px;">Səbət boşdur</div>' : '';
      
      cart.forEach((item, i) => {
        const itemSum = item.qty * item.price;
        list.innerHTML += `
          <div style="display:flex; gap:15px; padding:15px 0; border-bottom:1px solid var(--border);">
            <div style="flex:1;">
              <div style="font-family:'Barlow Condensed'; font-weight:700; font-size:15px; text-transform:uppercase; color:var(--text);">${item.name}</div>
              <div style="font-size:12px; color:var(--muted); margin-top:4px; display:flex; align-items:center; gap:8px;">
                <input type="number" class="cart-qty-input" value="${item.qty}" 
                       oninput="updateItemQty(${i}, this.value)" 
                       onclick="this.select()"> ədəd x ${item.price.toFixed(2)} AZN
              </div>
              <button onclick="removeItem(${i})" style="background:none; border:none; color:#ff4d4d; font-size:10px; cursor:pointer; margin-top:8px; font-weight:700;">SİL ✕</button>
            </div>
            <div style="font-family:'Barlow Condensed'; font-weight:700; color:var(--gold); font-size:20px;">
                <span id="sum-${i}">${itemSum.toFixed(2)}</span>
            </div>
          </div>`;
      });
      calculateGrandTotal();
    }

    function toggleCart(open) {
      document.getElementById('sidebar').classList.toggle('active', open);
      document.getElementById('overlay').classList.toggle('active', open);
    }

    function sendOrder() {
      if(!cart.length) return alert("Səbətiniz boşdur!");
      let txt = "*YENİ SİFARİŞ — NELSON BOYA*\n\n";
      let total = 0;
      cart.forEach((it, i) => {
        if(it.qty > 0) {
            const s = it.price * it.qty; total += s;
            txt += `${i+1}. *${it.name}*\n   Miqdar: ${it.qty} ədəd\n   Cəm: ${s.toFixed(2)} AZN\n\n`;
        }
      });
      txt += `*ÜMUMİ YEKUN MƏBLƏĞ: ${total.toFixed(2)} AZN*`;
      window.open(`https://wa.me/994517279955?text=${encodeURIComponent(txt)}`, '_blank');
    }

    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    function toggleMusic() {
      if (music.paused) { music.play(); musicBtn.innerText = '⏸️'; } 
      else { music.pause(); musicBtn.innerText = '🎵'; }
    }

    window.addEventListener('scroll', () => {
      if (!audioInitiated) {
        music.play().then(() => { musicBtn.innerText = '⏸️'; }).catch(() => {});
        audioInitiated = true;
      }
    }, { once: true });

    window.onload = () => { renderProducts(); updateUI(); };
  </script>
</body>
</html>
